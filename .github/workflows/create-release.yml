name: Create Release

on:
  push:
    tags:
      - '*.*.*'

# Required for OIDC trusted publishing
permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install Pnpm
        run: |
          npm install -g pnpm

      - name: Update Package Version
        run: |
          # Extract version from tag (remove 'v' prefix if exists)
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Updating package.json version to $VERSION"
          pnpm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build Library
        run: |
          pnpm i
          pnpm build

      - name: Extract Changelog
        id: extract_changelog
        run: |
          zip --junk-paths react-three-lite ./dist/*

          # Set the delimiter
          delimiter="---"

          # Read the file and extract the first part
          while read -r line
          do
              if [[ $line == "$delimiter" ]]
              then
                  break
              fi
              echo $line >> release_body.md
          done < "CHANGELOG.md"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: release_body.md
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./react-three-lite.zip
          asset_name: react-three-lite.zip
          asset_content_type: application/zip

      - name: Publish to NPM
        run: |
          pnpm publish --provenance --access public --no-git-checks

      - name: Install Docusaurus and Build Docs
        run: |
          cd docs
          pnpm i
          # Update version from package.json
          VERSION=$(node -p "require('../package.json').version")
          echo "{\"version\": \"$VERSION\"}" > src/version.json
          pnpm docs:build

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: gh-pages
          build_dir: docs/build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
